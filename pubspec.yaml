name: http_certificate_pinning_plus
description: HTTPS certificate pinning for Flutter with SHA-1/SHA-256 fingerprints, leaf or root certificate validation, Dio/http helpers, and in-memory check caching.
version: 3.2.0
homepage: https://github.com/weixuefeng/http_certificate_pinning

environment:
  sdk: ^3.5.4
  flutter: '>=3.3.0'

dependencies:
  dio: '>=4.0.6 <6.0.0'
  flutter:
    sdk: flutter
  http: ^1.3.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: site.txtool.http_certificate_pinning_plus
        pluginClass: HttpCertificatePinningPlugin
      ios:
        pluginClass: HttpCertificatePinningPlugin
